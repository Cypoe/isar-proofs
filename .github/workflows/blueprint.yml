name: Compile blueprint

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.0
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Build and lint project
        uses: leanprover/lean-action@434f25c2f80ded67bba02502ad3a86f25db50709 # 2025-07-02
        with:
          build: true
          lint: false
          mk_all-check: false

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-xetex \
            latexmk

      - name: Compile all blueprint PDFs
        working-directory: blueprint/src
        run: |
          latexmk -pdflatex=pdflatex -pdf -interaction=nonstopmode print_monograph.tex
          latexmk -pdflatex=pdflatex -pdf -interaction=nonstopmode print_monograph.tex
          latexmk -pdflatex=pdflatex -pdf -interaction=nonstopmode print_paper_a.tex
          latexmk -pdflatex=pdflatex -pdf -interaction=nonstopmode print_paper_a.tex
          latexmk -pdflatex=pdflatex -pdf -interaction=nonstopmode print_paper_b.tex
          latexmk -pdflatex=pdflatex -pdf -interaction=nonstopmode print_paper_b.tex
          latexmk -pdflatex=pdflatex -pdf -interaction=nonstopmode print_paper_c.tex
          latexmk -pdflatex=pdflatex -pdf -interaction=nonstopmode print_paper_c.tex

      - name: Copy PDFs and assets into home_page for Jekyll
        run: |
          mkdir -p home_page/pdf
          cp blueprint/src/print_monograph.pdf home_page/pdf/blueprint_monograph.pdf
          cp blueprint/src/print_paper_a.pdf   home_page/pdf/blueprint_paper_a.pdf
          cp blueprint/src/print_paper_b.pdf   home_page/pdf/blueprint_paper_b.pdf
          cp blueprint/src/print_paper_c.pdf   home_page/pdf/blueprint_paper_c.pdf
          cp -r zoo/            home_page/zoo/
          cp -r visualizations/ home_page/visualizations/

      - name: Compile blueprint and documentation
        uses: leanprover-community/docgen-action@deed0cdc44dd8e5de07a300773eb751d33e32fc8 # 2025-10-26
        with:
          blueprint: true
          homepage: home_page
