name = "isar"
lintDriver = "batteries/runLinter"
defaultTargets = ["ISAR"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
weak.linter.docBlame = false
weak.linter.unusedVariables = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "«doc-gen4»"
git = "https://github.com/leanprover/doc-gen4"
rev = "v4.31.0"

[[lean_lib]]
name = "ISAR"
srcDir = "src"
