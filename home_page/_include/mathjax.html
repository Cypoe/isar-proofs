<!-- Check if the current page requires MathJax support -->
{% if page.usemathjax %}
  <!-- MathJax configuration script -->
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      TeX: {
        equationNumbers: {
          autoNumber: "AMS"  <!-- Automatically number equations using AMS style -->
        },
        inlineMath: [['$$', '$$'], ['\\(', '\\)']],
        macros: {
          Prop: "{\\mathrm{Prop}}",
          Type: "{\\mathrm{Type}}",
          NN: "{\\mathbb{N}}",
          ZZ: "{\\mathbb{Z}}",
          RR: "{\\mathbb{R}}",
          F: "{\\mathscr{F}}",
          id: "{\\mathop{id}}",
          Opens: "{\\mathop{Opens}}",
          bold: ["{\\bf #1}", 1],
          bm: ["{\\boldsymbol #1}", 1],
          boldsymbol: ["{\\boldsymbol #1}", 1]
        }
      }
    });
  </script>
  <!-- Load MathJax library asynchronously from the CDN -->
  <script type="text/javascript" async
    src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML">
  </script>
{% endif %}
